name: Deploy to Self-Hosted Runner

on:
  push:
    branches: [ main, develop, test ]
  workflow_dispatch:
    inputs:
      server_port:
        description: 'Application port'
        required: false
        default: '3100'
      deployment_branch:
        description: 'Override deployment branch (optional)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      APP_CONTAINER_NAME: fixmycity-app
      COMPOSE_PROJECT_NAME: fixmycity
      COMPOSE_BAKE: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: '3.9.6'

      - name: Extract deployment information
        id: deployment-info
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          MANUAL_BRANCH="${{ github.event.inputs.deployment_branch }}"
          if [ -n "$MANUAL_BRANCH" ]; then
            BRANCH="$MANUAL_BRANCH"
          fi
          COMMIT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          PORT_INPUT="${{ github.event.inputs.server_port }}"
          if [ -z "$PORT_INPUT" ]; then
            PORT_INPUT="3100"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "server_port=$PORT_INPUT" >> $GITHUB_OUTPUT

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
        run: |
          npm ci
          npm run build

      - name: Copy frontend build into Spring static resources
        run: |
          rm -rf src/main/resources/static
          mkdir -p src/main/resources/static
          cp -r frontend/dist/* src/main/resources/static/   

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Check Docker availability
        run: docker compose version

      - name: Write deployment .env for compose
        env:
          SERVER_PORT: ${{ steps.deployment-info.outputs.server_port }}
        run: |
          cat > .env << EOF
          DB_NAME=fixmycity
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          SERVER_PORT=${SERVER_PORT}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_MS=3600000
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          FRONTEND_RESET_PASSWORD_URL=https://team1.acnbootcamp.lv/reset-password
          PASSWORD_RESET_EXPIRATION_MINUTES=30
          EOF

      - name: Stop existing stack (if running)
        continue-on-error: true
        run: docker compose down

      - name: Resolve compose config
        run: docker compose config > docker-compose.resolved.yml

      - name: Build and start stack
        run: docker compose -f docker-compose.resolved.yml up -d --build app mysql

      - name: Verify deployment
        env:
          SERVER_PORT: ${{ steps.deployment-info.outputs.server_port }}
        run: |
          for i in {1..30}; do
            if ! docker ps --format '{{.Names}}' | grep -qx "$APP_CONTAINER_NAME"; then
              echo "Application container is not running"
              docker compose -f docker-compose.resolved.yml logs app || true
              exit 1
            fi

            if docker logs $APP_CONTAINER_NAME 2>&1 | grep -qE "Started [A-Za-z]+ in"; then
              echo "Application container is running and Spring Boot has started"
              docker ps --filter "name=$APP_CONTAINER_NAME"
              exit 0
            fi

            echo "Attempt $i: Waiting for Spring Boot startup confirmation..."
            sleep 2
          done

          echo "Application did not report successful startup in logs"
          docker compose -f docker-compose.resolved.yml logs app || true
          exit 1

      - name: Display application logs
        if: always()
        run: docker compose logs --tail 50 app || true